<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Job Capture Assistant Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <h1 id="settingsTitle"></h1>

    <section class="card">
      <h2 id="languageTitle"></h2>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
      </select>
    </section>

    <section class="card">
      <h2 id="templateMatchesTitle"></h2>
      <table>
        <thead>
          <tr>
            <th id="templateNameHeader"></th>
            <th id="urlMatchHeader"></th>
          </tr>
        </thead>
        <tbody id="templateTableBody"></tbody>
      </table>
    </section>

    <div class="actions">
      <button id="saveButton"></button>
      <span id="saveStatus"></span>
    </div>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
