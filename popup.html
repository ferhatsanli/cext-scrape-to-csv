<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Job Copy Extension</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 id="appTitle">Job Copy Extension</h1>
      <button id="openSettingsBtn" class="ghost-btn">Settings</button>
    </header>

    <section class="section">
      <label class="label" for="templateSelect" id="activeTemplateLabel">Active Template</label>
      <div class="row">
        <select id="templateSelect"></select>
        <button id="newTemplateBtn" class="ghost-btn small-btn">+</button>
        <button id="renameTemplateBtn" class="ghost-btn small-btn">R</button>
        <button id="deleteTemplateBtn" class="danger-btn small-btn">X</button>
      </div>
    </section>

    <section class="section">
      <label class="label" for="listSelect" id="activeListLabel">Active List</label>
      <div class="row">
        <select id="listSelect"></select>
        <button id="newListBtn" class="ghost-btn small-btn">+</button>
        <button id="renameListBtn" class="ghost-btn small-btn">R</button>
        <button id="deleteListBtn" class="danger-btn small-btn">X</button>
      </div>
    </section>

    <section class="section">
      <label class="checkbox-row">
        <input type="checkbox" id="showColumnNamesCheckbox" />
        <span id="columnNamesLabel">Column Names</span>
      </label>
    </section>

    <section class="section actions">
      <button id="selectElementBtn" class="primary-btn">Select Element</button>
      <button id="scrapeNowBtn" class="secondary-btn">Scrape Now</button>
    </section>

    <section class="section">
      <table class="fields-table">
        <thead>
          <tr id="tableHeadRow"></tr>
        </thead>
        <tbody id="fieldsTbody"></tbody>
      </table>
      <div id="emptyState" class="empty-state">No fields defined</div>
    </section>

    <div id="undoBar" class="undo-bar hidden">
      <span id="undoText">Field removed</span>
      <div class="undo-actions">
        <button id="undoBtn" class="ghost-btn">Undo</button>
        <button id="dismissUndoBtn" class="ghost-btn">Dismiss</button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
